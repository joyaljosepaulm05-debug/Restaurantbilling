{% extends "hello_world/base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto;">
    <h2>Staff Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background: #092e20; color: white; padding: 10px 20px; border: none; border-radius: 5px; width: 100%;">
            Login
        {% if form.errors %}
           <p style="color: red;">Invalid username or password.</p>
        {% endif %}
        </button>
    </form>
</div>
{% endblock %}
